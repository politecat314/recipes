{% extends "base.html" %}

{% block content %}
  <div class="text-center mb-5">
    <h1 class="display-4">Welcome to Amambe's Recipe Book</h1>
    <p class="lead">Find your next favorite meal.</p>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    
    {% for id, recipe in recipes.items() %}
    <div class="col">
      <div class="card h-100 shadow-sm recipe-card">
        
        <img src="{{ recipe.image_url }}" 
             class="card-img-top" 
             alt="{{ recipe.name }}"
             onerror="this.src='{{ recipe.image_placeholder }}'; this.onerror=null;">
        
        <div class="card-body">
          <h5 class="card-title">{{ recipe.name }}</h5>
          <p class="card-text">{{ recipe.description }}</p>
        </div>
        <div class="card-footer bg-white border-0 pb-3">
          <a href="{{ url_for('recipe_detail', recipe_id=id) }}" class="btn btn-primary">View Recipe</a>
        </div>
      </div>
    </div>
    {% endfor %}
    
  </div>
{% endblock %}
